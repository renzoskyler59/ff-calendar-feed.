name: Cập nhật lịch kinh tế ForexFactory

# Chạy mỗi 15 phút — dư sức nằm dưới giới hạn 2 request/5 phút của ForexFactory,
# vì GitHub Actions dùng dải IP chia sẻ cực lớn (không như vài proxy công cộng
# cố định IP mà hàng ngàn app khác cũng đang dùng chung).
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # cho phép bấm "Run workflow" để chạy thủ công ngay lập tức

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tải lịch kinh tế từ ForexFactory
        run: |
          set -e
          URLS=(
            "https://nfs.faireconomy.media/ff_calendar_thisweek.json"
            "https://cdn-nfs.faireconomy.media/ff_calendar_thisweek.json"
          )
          OK=0
          for URL in "${URLS[@]}"; do
            echo "Đang thử: $URL"
            if curl -fsSL --max-time 20 -A "Mozilla/5.0 (compatible; FIPLOGPRO-bot/1.0)" "$URL" -o ff_calendar.tmp.json; then
              # Kiểm tra đây thực sự là JSON hợp lệ (mảng), không phải trang "Request Denied"
              if node -e "const d=require('./ff_calendar.tmp.json'); if(!Array.isArray(d)||!d.length) process.exit(1)"; then
                mv ff_calendar.tmp.json ff_calendar.json
                OK=1
                break
              else
                echo "Phản hồi không phải JSON hợp lệ, thử nguồn kế tiếp..."
              fi
            else
              echo "Không tải được từ $URL, thử nguồn kế tiếp..."
            fi
          done
          if [ "$OK" -ne 1 ]; then
            echo "Tất cả nguồn đều thất bại trong lần chạy này — giữ nguyên file cũ."
            exit 0
          fi

      - name: Commit nếu có thay đổi
        run: |
          if git diff --quiet -- ff_calendar.json 2>/dev/null; then
            echo "Không có gì thay đổi."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add ff_calendar.json
            git commit -m "Cập nhật lịch kinh tế ForexFactory [tự động]"
            git push
          fi
